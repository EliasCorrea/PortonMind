<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <a-scene mindar-image="imageTargetSrc: ./PortonLA.mind;
            missTolerance: 0;
            filterMinCF: 0.001;
            filterBeta: 0.01;
            warmupTolerance: 5" vr-mode-ui="enabled: false" color-space="sRGB"
            device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="Go2Model"
                src="https://raw.githubusercontent.com/EliasCorrea/PortonMind/refs/heads/main/models/Go2/Go2.gltf">
            </a-asset-item>

            <a-asset-item id="eveModel"
                src="https://raw.githubusercontent.com/EliasCorrea/PortonMind/refs/heads/main/models/EVA/eva.gltf">
            </a-asset-item>

            <a-asset-item id="ezeizaModel"
                src="https://raw.githubusercontent.com/EliasCorrea/PortonMind/refs/heads/main/models/Ezeiza/Ezeiza.gltf">
            </a-asset-item>
            
            <a-asset-item id="Cheeseburger"
                src="https://raw.githubusercontent.com/EliasCorrea/PortonMind/refs/heads/main/models/Food/Cheeseburger.glb">
            </a-asset-item>

            <a-asset-item id="Burrito"
                src="https://raw.githubusercontent.com/EliasCorrea/PortonMind/refs/heads/main/models/Food/Burrito.glb">
            </a-asset-item>

            <a-asset-item id="Taco"
                src="https://raw.githubusercontent.com/EliasCorrea/PortonMind/refs/heads/main/models/Food/Taco.glb">
            </a-asset-item>

        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"
            raycaster="far: 10000; objects: .clickable">
        </a-camera>

        <a-entity mindar-image-target="targetIndex: 0">

            <a-gltf-model id="go2-entity" rotation="90 0 0" position="0 0 0.1" scale="1.5 1.5 1.5" src="#Go2Model"></a-gltf-model>

            <a-box id="btn-rotate" class="clickable" position="-0.5 -0.5 -0.1" rotation="90 0 0" scale="0.2 0.1 0.1" color="red">
                <a-entity text="value: Encendido; color: #FFFFFF; width: 1; align: center; anchor: center" position="0 1 0" scale="10 10 10"></a-entity>
            </a-box>

            <a-box id="btn-bateria" class="clickable" position="0 -0.5 -0.1" scale="0.2 0.1 0.1" color="blue">
                <a-entity text="value: Encendido; color: #FFFFFF; width: 1; align: center; anchor: center" position="0 1 0" scale="10 10 10"></a-entity>
            </a-box>

            <a-box id="btn-info" class="clickable" position="0.5 -0.5 -0.1" scale="0.2 0.1 0.1" color="yellow">
                <a-entity text="value: INFO; color: #FFFFFF; width: 1; align: center; anchor: center" position="0 1 0" scale="10 10 10"></a-entity>
            </a-box>

            <a-entity text="value: Unitree Go2, AiphaG; color: #FAFAFA; width: 6; anchor: align" position="0.5 -0.5 0" rotation="0 0 90" scale="0.5 0.5 0.5"></a-entity>
            
            <a-entity text="value: BT2-05 Smart Battery, ; color: #FAFAFA; width: 1.5; anchor: align" position="0.25 -0.135 0.8" rotation="0 90 90" scale="0.5 0.5 0.5"></a-entity>

            <a-entity text="value: LIDAR 4D Sensor; color: #FAFAFA; width: 1.5; anchor: align" position="-0.15 -0.5 0.7" rotation="90 0 0" scale="0.5 0.5 0.5"></a-entity>

        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model rotation="90 0 0" position="0 0 0.1" scale="0.0075 0.0075 0.0075" src="#ezeizaModel"></a-gltf-model>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2">
            <a-gltf-model rotation="0 90 90" position="0 0 0.1" scale="0.3 0.3 0.3" src="#eveModel"
                animation="property: position; to: 0 0 0.4; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate">
            </a-gltf-model>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 3">
            <a-gltf-model rotation="0 0 0" position="0.5 0 0.1" scale="0.75 0.75 0.75" src="#Taco"></a-gltf-model>
            <a-gltf-model rotation="0 0 0" position="0 0 0.1" scale="0.5 0.5 0.5" src="#Burrito"></a-gltf-model>
            <a-gltf-model rotation="0 0 0" position="-0.5 0 0.1" scale="0.1 0.1 0.1" src="#Cheeseburger"></a-gltf-model>
        </a-entity>

    </a-scene>
    <script src="funtions.js"></script>
</body>

</html>
