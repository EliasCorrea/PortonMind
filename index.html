<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>
    <a-scene
        mindar-image="imageTargetSrc: ./targets.mind"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">

        <a-assets>
            <a-asset-item id="Go2Model" src="https://raw.githubusercontent.com/EliasCorrea/PortonMind/refs/heads/main/models/Go2/Go2.gltf"></a-asset-item>
            <a-asset-item id="eveModel" src="https://raw.githubusercontent.com/EliasCorrea/PortonMind/main/models/eve.glb"></a-asset-item>
            <a-asset-item id="skullModel" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/ScatteringSkull/glTF/ScatteringSkull.gltf"></a-asset-item>
            <a-asset-item id="avocadoModel" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Avocado/glTF/Avocado.gltf"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model rotation="90 0 0 "
                position="0 0 0.1"
                scale="2 2 2"
                src="#Go2Model">
            </a-gltf-model>
        </a-entity>

    </a-scene>
</body>

</html>
